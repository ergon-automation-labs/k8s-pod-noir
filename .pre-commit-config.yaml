# Optional: pip install pre-commit && pre-commit run --all-files
# On-commit playtest uses tracked hooks: ./scripts/setup-git-hooks.sh  (core.hooksPath=githooks)
# Do not use "pre-commit install" for playtest — it writes .git/hooks, ignored when hooksPath is set.
# Env: SKIP_PLAYTEST_SMOKE=1 — skip cluster smoke
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
