apiVersion: v1
kind: Namespace
metadata:
  name: pod-noir
  labels:
    app.kubernetes.io/part-of: pod-noir
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: precinct-paperwork
  namespace: pod-noir
  labels:
    app.kubernetes.io/part-of: pod-noir
  annotations:
    description: "Ledger says 100m CPU for the whole floor; one witness wants 250m"
spec:
  hard:
    requests.cpu: "100m"
    requests.memory: "256Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-queue
  namespace: pod-noir
  labels:
    app.kubernetes.io/part-of: pod-noir
    app: ledger-queue
  annotations:
    kubernetes.io/change-cause: "ledger-queue — requests exceed ResourceQuota (broken)"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger-queue
  template:
    metadata:
      labels:
        app: ledger-queue
        app.kubernetes.io/part-of: pod-noir
    spec:
      containers:
        - name: clerk
          image: busybox:1.36.1
          command: ["/bin/sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: "250m"
              memory: "64Mi"
