apiVersion: v1
kind: Namespace
metadata:
  name: pod-noir
  labels:
    app.kubernetes.io/part-of: pod-noir
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: evidence-vol
  namespace: pod-noir
  labels:
    app.kubernetes.io/part-of: pod-noir
  annotations:
    description: "Points at a StorageClass the cluster never issued"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: noir-vault-never-built
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evidence-worker
  namespace: pod-noir
  labels:
    app.kubernetes.io/part-of: pod-noir
    app: evidence-worker
  annotations:
    kubernetes.io/change-cause: "evidence-worker — waits on PVC that cannot bind (broken)"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evidence-worker
  template:
    metadata:
      labels:
        app: evidence-worker
        app.kubernetes.io/part-of: pod-noir
    spec:
      containers:
        - name: archivist
          image: busybox:1.36.1
          command: ["/bin/sh", "-c", "sleep 3600"]
          volumeMounts:
            - name: evidence
              mountPath: /evidence
      volumes:
        - name: evidence
          persistentVolumeClaim:
            claimName: evidence-vol
