apiVersion: v1
kind: Namespace
metadata:
  name: pod-noir
  labels:
    app.kubernetes.io/part-of: pod-noir
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lock-the-door
  namespace: pod-noir
  labels:
    app.kubernetes.io/part-of: pod-noir
  annotations:
    description: "Deny all egress — tape can't leave the room to resolve names"
spec:
  podSelector:
    matchLabels:
      app: tape-deck
  policyTypes:
    - Egress
  egress: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tape-deck
  namespace: pod-noir
  labels:
    app.kubernetes.io/part-of: pod-noir
    app: tape-deck
  annotations:
    kubernetes.io/change-cause: "tape-deck — needs DNS to stand up; NP blocks egress (broken)"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tape-deck
  template:
    metadata:
      labels:
        app: tape-deck
        app.kubernetes.io/part-of: pod-noir
    spec:
      containers:
        - name: reel
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              nslookup kubernetes.default.svc.cluster.local >/dev/null 2>&1 || exit 1
              exec sleep 3600
