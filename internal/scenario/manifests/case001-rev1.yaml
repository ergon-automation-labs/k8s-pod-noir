apiVersion: v1
kind: Namespace
metadata:
  name: pod-noir
  labels:
    app.kubernetes.io/part-of: pod-noir
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-worker
  namespace: pod-noir
  labels:
    app.kubernetes.io/part-of: pod-noir
    app: payments-worker
  annotations:
    kubernetes.io/change-cause: 'payments-worker 2.0.3 — known-good startup (idle worker)'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-worker
  template:
    metadata:
      labels:
        app: payments-worker
        app.kubernetes.io/part-of: pod-noir
        version: "2.0.3"
    spec:
      containers:
        - name: payments-worker
          image: busybox:1.36.1
          command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
